name: Build and Publish Container

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish (for example: v27.0.1)"
        required: false
        type: string
      branch:
        description: "Branch to build and publish when no tag is supplied"
        required: false
        default: develop
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || format('refs/heads/{0}', inputs.branch)) || github.ref }}
          fetch-depth: 2

      - name: Determine whether develop push should build
        id: skip_check
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          changed=$(git diff --name-only HEAD^ HEAD | grep -E '^(Dockerfile|entrypoint.sh)$' || true)
          if [ -z "$changed" ]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/develop' || steps.skip_check.outputs.skip_build != 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/develop' || steps.skip_check.outputs.skip_build != 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/develop' || steps.skip_check.outputs.skip_build != 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }} 
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/develop' || steps.skip_check.outputs.skip_build != 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=develop,enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' && inputs.branch == 'develop' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && (inputs.tag != '' || inputs.branch == 'main')) }}

      - name: Build and push image
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/develop' || steps.skip_check.outputs.skip_build != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
